<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jackie's Helpful Forms</title>
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="favicon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Helpful Forms">
  <meta name="theme-color" content="#a259ff">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 20px;
      background-color: #f9f9f9;
      color: #333;
    }
    h1 {
      font-size: 24px;
      display: flex;
      align-items: center;
    }
    h1 img {
      height: 32px;
      margin-right: 10px;
    }
    h2 {
      font-size: 20px;
      display: flex;
      align-items: center;
      margin-bottom: 0;
    }
    a {
      display: block;
      margin-top: 20px;
      color: #6c3fcf;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;        /* allow items to wrap on small screens */
      align-items: center;
      gap: 8px;               /* space between buttons/dropdown */
      margin-top: 12px;
    }
    .btn-style, .btn-link {
      display: inline-block;
      background-color: white;
      color: #007bff;
      border: 0.5px solid #007bff;
      border-radius: 4px;
      padding: 5px 20px;  /* adjust padding if needed */
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      font-size: 12px;     /* explicitly set font size to match refresh button */
      margin-top: 4px;     /* optional spacing from heading */
      white-space: nowrap;    /* keep each button’s text on one line */
    }
    .btn-style:hover, .btn-link:hover {
      background-color: #e6f0ff;    /* very light blue hover */
      color: #0056b3;               /* slightly darker text on hover */
      text-decoration: none;        /* keep no underline */
    }
    label, 
    #filterSelect {
      font-size: 14px;
    }
    table {
      border-collapse:collapse;width:100%;margin-top:12px
    }
    th,td {
      border:1px solid #ddd;padding:8px;text-align:left
    }
    th {
      background:#f3f3f3
    }
    td a 
    {
      display: inline-block;
      vertical-align: middle;
    }
    select {
      padding:6px
    }
    #dataTable td,
    #dataTable th {
      vertical-align: middle; /* center content vertically */
      padding: 8px;
      font-size: 12px;
    }
    #dataTable td a {
      margin: 0;               /* remove any default margin */
      padding: 0;              /* optional, ensure no extra space */
      line-height: 1.2;        /* helps vertical centering */
      font-size:12px;          /* match the smaller table text */
      color: #6c3fcf;           /* or whichever color you want */
      text-decoration: none;
      vertical-align: middle;   /* ensures inline text is centered */
    }
  </style>
</head>
  
<body>
  <h1>
    <img src="favicon.png" alt="Icon" style="height: 32px; margin-right: 10px;">
    Jackie's Helpful Forms
  </h1>
<h2>Travel Expenses</h2>
  <div class="controls">
  <a href="https://forms.gle/Efmbz5brKNyohqQe7" target="_blank" rel="noopener" class="btn-link">New Expense</a>
  <button id="refreshBtn" class="btn-style">Refresh</button>

  <label for="filterSelect" class="filter-label">
    Filter by trip:
    <select id="filterSelect">
      <option value="">-- All --</option>
    </select>
  </label>
</div>

<script>
  document.getElementById('refreshBtn').addEventListener('click', function() {
    location.reload();
  });
</script>

<table id="dataTable">
  <thead></thead>
  <tbody></tbody>
</table>
  
<script>
/* CONFIG — replace these */
const SPREADSHEET_ID = '1J4dldGjb3SktoVxQD3BKm-iX6RDAF7YjoLImm7-MIsg';
const API_KEY = 'AIzaSyCkQIbYsNr6ooub1lJysGoSflG9bka0fbs';
const SHEET_NAME = 'Form Responses 1!A:G';            // change to your sheet name
const FILTER_COLUMN_INDEX = 0;          // zero-based index of column to populate the dropdown from
/* END CONFIG */

const endpoint = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}?key=${API_KEY}&majorDimension=ROWS`;

let allRows = []; // array of arrays (rows)

async function loadSheet(){
  const res = await fetch(endpoint);
  if(!res.ok){ console.error('Sheets API error', await res.text()); return; }
  const j = await res.json();
  const rows = j.values || [];
  if(rows.length === 0) return;
  const headers = rows[0];
  headers[6] = "Link to File"; // force column 7 header text
  allRows = rows.slice(1);

  // build headers
  document.querySelector('#dataTable thead').innerHTML =
    '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';

  // populate dropdown with unique values from FILTER_COLUMN_INDEX
  const set = new Set(allRows.map(r => (r[FILTER_COLUMN_INDEX]||'').trim()).filter(x=>x!==''));
  const select = document.getElementById('filterSelect');
  Array.from(set).sort().forEach(val=>{
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = val;
    select.appendChild(opt);
  });

  renderTable(allRows);
}

function renderTable(rows){
  const tbody = document.querySelector('#dataTable tbody');
  tbody.innerHTML = '';
  rows.forEach(r=>{
    const tr = document.createElement('tr');

    const cells = r.map((c, i) => {
      // Make column 7 (index 6) a hyperlink if it has a value
      if(i === 6 && c){
        const safeUrl = c.startsWith('http') ? c : 'https://' + c;
        return `<td><a href="${safeUrl}" target="_blank" rel="noopener" style="display:inline-block; vertical-align:middle;">Link</a></td>`;

      }
      return `<td>${c}</td>`;
    }).join('');

    tr.innerHTML = cells;
    tbody.appendChild(tr);
    
  });
}

document.getElementById('filterSelect').addEventListener('change', function(){
  const v = this.value;
  const filtered = v ? allRows.filter(r => (r[FILTER_COLUMN_INDEX]||'') === v) : allRows;
  renderTable(filtered);
});

// load on start
loadSheet();
</script>

</body>
</html>
