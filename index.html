<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jackie's Helpful Forms</title>
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="favicon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Helpful Forms">
  <meta name="theme-color" content="#a259ff">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 20px;
      background-color: #f9f9f9;
      color: #333;
    }
    h1 {
      font-size: 24px;
      display: flex;
      align-items: center;
    }
    h1 img {
      height: 32px;
      margin-right: 10px;
    }
    h2 {
      font-size: 20px;
      display: flex;
      align-items: center;
      margin-bottom: 0;
    }
    a {
      display: block;
      margin-top: 20px;
      font-size: 18px;
      color: #6c3fcf;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  .btn-style, .btn-link {
      display: inline-block;
      background-color: #ab55fa;
      color: white;
      border: none;
      border-radius: 4px;
      text-decoration: none;
      cursor: pointer;
      text-align: center;
      padding: 10px 20px;
    }
  .btn-style:hover, .btn-link:hover {
      background-color: #5932a6; 
      text-decoration: none;
    }
  .btn-link {
      margin-top: 4px;
    }
   select {
      padding:6px
    }
    table {
      border-collapse:collapse;width:100%;margin-top:12px
    }
    th,td {
      border:1px solid #ddd;padding:8px;text-align:left
    }
    th {
      background:#f3f3f3
    }
    td a 
    {
      display: inline-block;
      vertical-align: middle;
    }
    #dataTable {
      font-size: 6px; /* smaller text */
    }
    #refreshBtn {
      background-color: white;
      color: #007bff;       /* light blue text */
      border: 0.5px solid #007bff;
      border-radius: 4px;
      padding: 5px 5px;
      cursor: pointer;
      text-align: center;
    }
    #refreshBtn:hover {
      background-color: #e6f0ff; /* very light blue hover effect */
      color: #0056b3;            /* slightly darker text on hover */
    }
  </style>
</head>
  
<body>
  <h1>
    <img src="favicon.png" alt="Icon" style="height: 32px; margin-right: 10px;">
    Jackie's Helpful Forms
  </h1>
  <a href="https://forms.gle/Efmbz5brKNyohqQe7" target="_blank" rel="noopener" class="btn-link">Submit Travel Expenses</a>

<h2>View Travel Expenses</h2>
  <label>For trip:
    <select id="filterSelect"><option value="">-- All --</option></select>
  </label>

  <table id="dataTable">
    <thead></thead>
    <tbody></tbody>
  </table>
  
  <script>
/* CONFIG — replace these */
const SPREADSHEET_ID = '1J4dldGjb3SktoVxQD3BKm-iX6RDAF7YjoLImm7-MIsg';
const API_KEY = 'AIzaSyCkQIbYsNr6ooub1lJysGoSflG9bka0fbs';
const SHEET_NAME = 'Form Responses 1!A:G';            // change to your sheet name
const FILTER_COLUMN_INDEX = 0;          // zero-based index of column to populate the dropdown from
/* END CONFIG */

const endpoint = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}?key=${API_KEY}&majorDimension=ROWS`;

let allRows = []; // array of arrays (rows)

async function loadSheet(){
  const res = await fetch(endpoint);
  if(!res.ok){ console.error('Sheets API error', await res.text()); return; }
  const j = await res.json();
  const rows = j.values || [];
  if(rows.length === 0) return;
  const headers = rows[0];
  allRows = rows.slice(1);

  // build headers
  document.querySelector('#dataTable thead').innerHTML =
    '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';

  // populate dropdown with unique values from FILTER_COLUMN_INDEX
  const set = new Set(allRows.map(r => (r[FILTER_COLUMN_INDEX]||'').trim()).filter(x=>x!==''));
  const select = document.getElementById('filterSelect');
  Array.from(set).sort().forEach(val=>{
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = val;
    select.appendChild(opt);
  });

  renderTable(allRows);
}

function renderTable(rows){
  const tbody = document.querySelector('#dataTable tbody');
  tbody.innerHTML = '';
  rows.forEach(r=>{
    const tr = document.createElement('tr');

    const cells = r.map((c, i) => {
      // Make column 7 (index 6) a hyperlink if it has a value
      if(i === 6 && c){
        const safeUrl = c.startsWith('http') ? c : 'https://' + c;
        return `<td><a href="${safeUrl}" target="_blank" rel="noopener" style="display:inline-block; vertical-align:middle;">Link</a></td>`;

      }
      return `<td>${c}</td>`;
    }).join('');

    tr.innerHTML = cells;
    tbody.appendChild(tr);
  });
}

document.getElementById('filterSelect').addEventListener('change', function(){
  const v = this.value;
  const filtered = v ? allRows.filter(r => (r[FILTER_COLUMN_INDEX]||'') === v) : allRows;
  renderTable(filtered);
});

// load on start
loadSheet();
</script>
<br>
  <button id="refreshBtn" class="btn-style">Refresh</button>
<script>
  document.getElementById('refreshBtn').addEventListener('click', function() {
    location.reload(); // reloads the page
  });
</script>

</body>
</html>
